<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Ambient Monitor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1719"/>
      <stop offset="100%" stop-color="#0f2022"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fdcb0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#4fdcb0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5cc6e8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#5cc6e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#7ff0d2"/>
      <stop offset="60%" stop-color="#4fdcb0"/>
      <stop offset="100%" stop-color="#2bb38f"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="1010" cy="60" rx="520" ry="320" fill="url(#glow1)"/>
  <ellipse cx="120" cy="120" rx="460" ry="300" fill="url(#glow2)"/>

  <!-- logo + wordmark -->
  <g transform="translate(90,86)">
    <rect width="56" height="56" rx="16" fill="#16282a" stroke="#2c4143" stroke-width="1.5"/>
    <circle cx="28" cy="28" r="13" fill="url(#dot)"/>
    <text x="78" y="38" font-family="'Space Grotesk',system-ui,sans-serif" font-size="30" font-weight="600" fill="#eafcf6">Ambient Monitor</text>
  </g>

  <!-- live chip -->
  <g transform="translate(90,196)">
    <rect width="330" height="40" rx="20" fill="#16302c" stroke="#2f6a5d" stroke-width="1.5"/>
    <circle cx="26" cy="20" r="6" fill="#4fdcb0"/>
    <text x="44" y="26" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="16" font-weight="600" fill="#7ff0d2">Live · ESP32 → Firebase → React</text>
  </g>

  <!-- headline -->
  <text font-family="'Space Grotesk',system-ui,sans-serif" font-weight="600" fill="#f3fbf8" letter-spacing="-1.5">
    <tspan x="90" y="330" font-size="72">A live window into a room's</tspan>
    <tspan x="90" y="412" font-size="72">air, light &amp; motion.</tspan>
  </text>

  <!-- metric chips -->
  <g font-family="'JetBrains Mono',ui-monospace,monospace" font-size="22" font-weight="600">
    <g transform="translate(90,470)">
      <rect width="150" height="58" rx="14" fill="#15211f" stroke="#2a3a38" stroke-width="1.5"/>
      <circle cx="26" cy="29" r="7" fill="#e0a14f"/>
      <text x="44" y="37" fill="#f0d8b8">22.4°C</text>
    </g>
    <g transform="translate(258,470)">
      <rect width="130" height="58" rx="14" fill="#15211f" stroke="#2a3a38" stroke-width="1.5"/>
      <circle cx="26" cy="29" r="7" fill="#5cc6e8"/>
      <text x="44" y="37" fill="#cfeaf6">46%</text>
    </g>
    <g transform="translate(406,470)">
      <rect width="160" height="58" rx="14" fill="#15211f" stroke="#2a3a38" stroke-width="1.5"/>
      <circle cx="26" cy="29" r="7" fill="#e8d24f"/>
      <text x="44" y="37" fill="#f3edc4">412 lux</text>
    </g>
    <g transform="translate(584,470)">
      <rect width="140" height="58" rx="14" fill="#15211f" stroke="#2a3a38" stroke-width="1.5"/>
      <circle cx="26" cy="29" r="7" fill="#b58cf0"/>
      <text x="44" y="37" fill="#e4d6f7">Motion</text>
    </g>
  </g>

  <text x="90" y="588" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="20" fill="#6f8a85">ambient.teonix.dev</text>
</svg>
